<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام المناطق النائية ومراكز الصيانة للدفع الرقمي</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Tahoma;
}

#map{
height:100vh;
}

.panel{
position:absolute;
top:10px;
right:10px;
z-index:999;
background:white;
padding:10px;
border-radius:10px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

select,#search{
width:100%;
padding:8px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

#search{
direction:rtl;
text-align:right;
}

/* ✅ التعديل هنا فقط */
#city {
  direction: rtl;
  text-align: right;
  text-align-last: right;
  padding-right: 10px;
}

#city option {
  text-align: right;
}
/* ------------------ */

#info{
margin-top:10px;
font-size:13px;
line-height:1.8;
text-align:right;
}

.logo{
position:absolute;
top:10px;
left:10px;
z-index:9999;
background:white;
padding:6px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.logo img{
width:140px;
height:auto;
display:block;
}
</style>
</head>

<body>

<!-- الشعار -->
<div class="logo">
<img src="./logo.png" alt="Logo">
</div>

<!-- لوحة التحكم -->
<div class="panel">

<b>نظام المناطق النائية ومراكز الصيانة للدفع الرقمي</b>

<input id="search" type="text" placeholder="🔍 ابحث عن مدينة..." autocomplete="off">

<select id="city">
<option>اختر مدينة أو اضغط عليها من الخريطة</option>
</select>

<div id="info"></div>

</div>

<div id="map"></div>

<script>

// ======================
// إنشاء الخريطة
// ======================
const map = L.map('map').setView([24.5,45.5],6);

// ======================
// خريطة OpenStreetMap
// ======================
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

// ======================
// طبقة صورة السعودية
// ======================
const imageBounds = [
[15.8, 33.5],
[32.8, 56.5]
];

L.imageOverlay('saudi-map.png', imageBounds, {
opacity:0.12
}).addTo(map);

// ======================
// أيقونة صفراء للموقع المختار
// ======================
const yellowIcon = new L.Icon({
iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-yellow.png',
shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
iconSize:[25,41],
iconAnchor:[12,41],
popupAnchor:[1,-34],
shadowSize:[41,41]
});

// ======================
// مراكز الصيانة
// ======================
const centers = [

{ name:"الرياض-11", lat:24.7136, lng:46.6753 },
{ name:"جدة-9", lat:21.5433, lng:39.1728 },
{ name:"الدمام-3", lat:26.4207, lng:50.0888 },
{ name:"أبها-1", lat:18.2164, lng:42.5053 },
{ name:"المدينة المنورة-3", lat:24.5247, lng:39.5692 },
{ name:"تبوك-2", lat:28.3998, lng:36.5715 },
{ name:"الأحساء-1", lat:25.386311, lng:49.568650 },
{ name:"الباحة-1", lat:20.012303, lng:41.468586599999995 },
{ name:"عفيف-1", lat:23.9042593, lng:42.9132605 },
{ name:"الدوادمي-1", lat:24.5167005, lng:44.4181786 },
{ name:"المجمعة-1", lat:25.875886599999998, lng:45.3730695 },
{ name:"القنفذة-1", lat:19.1281398, lng:41.0787392 },
{ name:"القريات-1", lat:31.329635200000002, lng:37.3613533 },
{ name:"الأفلاج-1", lat:22.289857899999998, lng:46.7188421 },
{ name:"عرعر-1", lat:30.981553, lng:41.016479 },
{ name:"بيشة-1", lat:20.000830, lng:42.599848 },
{ name:"بريدة-2", lat:26.330930, lng:43.971439 },
{ name:"حفر الباطن-1", lat:28.431990, lng:45.962351 },
{ name:"حائل-1", lat:27.520443, lng:41.697596 },
{ name:"جازان-3", lat:16.894303, lng:42.557791 },
{ name:"خميس مشيط-1", lat:18.299165, lng:42.734259 },
{ name:"الخبر-1", lat:26.304000, lng:50.196024 },
{ name:"مكة-2", lat:21.422602, lng:39.826216 },
{ name:"محايل عسير-1", lat:18.546568, lng:42.048815 },
{ name:"نجران-1", lat:17.543981, lng:44.224682 },
{ name:"عنيزة-1", lat:26.090858, lng:43.986435 },
{ name:"رفحاء-1", lat:29.632419, lng:43.517868 },
{ name:"شرورة-1", lat:17.491093, lng:47.112293 },
{ name:"الطايف-2", lat:21.270426, lng:40.415783 },
{ name:"ينبع-1", lat:24.089181, lng:38.068829 },



  

];

// ======================
// المدن
// ======================
const cities = [

{ name:"الرياض", lat:24.7136, lng:46.6753 },
{ name:"جدة", lat:21.5433, lng:39.1728 },
{ name:"مكة", lat:21.3891, lng:39.8579 },
{ name:"الدمام", lat:26.4207, lng:50.0888 },
{ name:"المدينة المنورة", lat:24.5247, lng:39.5692 },
{ name:"الطائف", lat:21.2703, lng:40.4158 },
{ name:"تبوك", lat:28.3998, lng:36.5715 },
{ name:"أبها", lat:18.2164, lng:42.5053 },
{ name:"نجران", lat:17.5656, lng:44.2289 },
{ name:"جازان", lat:16.8892, lng:42.5510 },
{ name:"حائل", lat:27.5114, lng:41.7208 },
{ name:"القصيم", lat:26.3260, lng:43.9750 },
{ name:"الأحساء", lat:25.3647, lng:49.5876 },
{ name:"الخبر", lat:26.2172, lng:50.1971 },
{ name:"الجبيل", lat:27.0046, lng:49.6665 },
{ name:"الباحة", lat:20.0129, lng:41.4677 },
{ name:"ينبع", lat:24.0895, lng:38.0637 },
{ name:"عرعر", lat:30.9753, lng:41.0381 },
{ name:"سكاكا", lat:29.9697, lng:40.2064 },
{ name:"القريات", lat:31.3317, lng:37.3433 },
{ name:"الخرج", lat:24.1559, lng:47.3345 },
{ name:"بالجرشي", lat:19.8656, lng:41.5776 }

];

// تعبئة القائمة
let select = document.getElementById("city");

cities.forEach(c=>{
let opt=document.createElement("option");
opt.value=c.name;
opt.textContent=c.name;
select.appendChild(opt);
});

// ======================
// البحث عن مدينة
// ======================
let search = document.getElementById("search");

search.oninput=function(){

let term=this.value.trim();

// إظهار/إخفاء الخيارات حسب البحث
for(let opt of select.options){
if(opt.value==="" || opt.index===0){ continue; }
opt.hidden = term!=="" && !opt.textContent.includes(term);
}

// إذا طابق البحث اسم مدينة تماماً شغّل الحساب مباشرة
let city = cities.find(c=>c.name===term);
if(city){
select.value=city.name;
run(city.lat,city.lng,city.name);
}

};

// باقي الكود بدون تغيير
centers.forEach(c=>{
L.marker([c.lat,c.lng])
.addTo(map)
.bindPopup(c.name);
});

async function nearestTwo(lat,lng){

// إرسال كل الطلبات دفعة واحدة (بالتوازي) بدل واحد تلو الآخر
let results = await Promise.all(centers.map(async c=>{

let response = await fetch(
`https://router.project-osrm.org/route/v1/driving/${lng},${lat};${c.lng},${c.lat}?overview=false`
);

let data = await response.json();

let route = data.routes[0];

return {
...c,
distance: route.distance,
duration: route.duration
};

}));

results.sort((a,b)=>a.duration-b.duration);

return results.slice(0,2);

}

function drawRoute(from,to,color,cb){

fetch(`https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`)
.then(r=>r.json())
.then(data=>{

let route = data.routes[0];

let coords = route.geometry.coordinates.map(c=>[c[1],c[0]]);

let options = {
color: color,
weight:4,
opacity:0.9
};

if(color === 'red'){
options.dashArray = '12,10';
}

let line = L.polyline(coords, options).addTo(map);

if(color === 'green'){
line.bringToFront();
}

cb(route.distance, route.duration, line);

});

}

async function run(lat,lng,name){

map.setView([lat,lng],7);

// ضع العلامة فوراً قبل انتظار حساب المسارات
if(window.clickedMarker){
map.removeLayer(window.clickedMarker);
}
window.clickedMarker = L.marker([lat,lng],{icon:yellowIcon}).addTo(map);

if(window.l1) map.removeLayer(window.l1);
if(window.l2) map.removeLayer(window.l2);

document.getElementById("info").innerHTML=
"<b>📍 الموقع:</b> "+name+"<br><br>⏳ جاري حساب أقرب مركز...";

let nearest = await nearestTwo(lat,lng);

drawRoute({lat,lng},nearest[1],'red',(d2,t2,line2)=>{

window.l2=line2;

drawRoute({lat,lng},nearest[0],'green',(d1,t1,line1)=>{

window.l1=line1;

let h1=Math.floor(t1/3600);
let m1=Math.round((t1%3600)/60);

let h2=Math.floor(t2/3600);
let m2=Math.round((t2%3600)/60);

document.getElementById("info").innerHTML=
"<b>📍 الموقع:</b> "+name+"<br><br>"+
"<b>🟢 أقرب مركز:</b> "+nearest[0].name+"<br>"+
"المسافة: "+(d1/1000).toFixed(1)+" كم<br>"+
"الوقت: "+h1+" ساعة و "+m1+" دقيقة<br><br>"+
"<b>🔴 أقرب مركز ثاني:</b> "+nearest[1].name+"<br>"+
"المسافة: "+(d2/1000).toFixed(1)+" كم<br>"+
"الوقت: "+h2+" ساعة و "+m2+" دقيقة";

});

});

}

select.onchange=function(){

let city = cities.find(c=>c.name==this.value);
if(!city) return;
run(city.lat,city.lng,city.name);

};

map.on('click',function(e){
run(e.latlng.lat,e.latlng.lng,"موقع من الخريطة");
});

</script>

</body>
</html>
