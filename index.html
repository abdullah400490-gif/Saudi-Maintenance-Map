<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام مراكز الصيانة - السعودية</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Tahoma; }
#map { height:100vh; }

.panel{
position:absolute;
top:10px;
right:10px;
z-index:999;
background:white;
padding:10px;
border-radius:10px;
width:280px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

select{
width:100%;
padding:8px;
margin-top:8px;
}

h3{
margin:0 0 10px 0;
}
</style>
</head>

<body>

<div class="panel">
<h3>مراكز الصيانة</h3>

<select id="city"></select>

<div id="info"></div>
</div>

<div id="map"></div>

<script>

// الخريطة
const map = L.map('map').setView([24.5,45.5],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

// مراكز الصيانة (تقدر تضيف/تعدل)
const centers = [
{ name:"الرياض", lat:24.7136, lng:46.6753 },
{ name:"جدة", lat:21.5433, lng:39.1728 },
{ name:"الدمام", lat:26.4207, lng:50.0888 },
{ name:"أبها", lat:18.2164, lng:42.5053 },
{ name:"المدينة المنورة", lat:24.5247, lng:39.5692 },
{ name:"تبوك", lat:28.3998, lng:36.5715 }
];

// مدن السعودية (موسع)
const cities = [
{ name:"الرياض", lat:24.7136, lng:46.6753 },
{ name:"جدة", lat:21.5433, lng:39.1728 },
{ name:"الدمام", lat:26.4207, lng:50.0888 },
{ name:"مكة", lat:21.3891, lng:39.8579 },
{ name:"المدينة المنورة", lat:24.5247, lng:39.5692 },
{ name:"الطائف", lat:21.2703, lng:40.4158 },
{ name:"تبوك", lat:28.3998, lng:36.5715 },
{ name:"أبها", lat:18.2164, lng:42.5053 },
{ name:"خميس مشيط", lat:18.3000, lng:42.7333 },
{ name:"نجران", lat:17.5656, lng:44.2289 },
{ name:"جازان", lat:16.8892, lng:42.5510 },
{ name:"حائل", lat:27.5114, lng:41.7208 },
{ name:"القصيم - بريدة", lat:26.3260, lng:43.9750 },
{ name:"الأحساء - الهفوف", lat:25.3647, lng:49.5876 },
{ name:"الجبيل", lat:27.0046, lng:49.6665 },
{ name:"الخبر", lat:26.2172, lng:50.1971 },
{ name:"القطيف", lat:26.5196, lng:50.0419 },
{ name:"الباحة", lat:20.0129, lng:41.4677 },
{ name:"الجبيل الصناعية", lat:27.0046, lng:49.6665 },
{ name:"ينبع", lat:24.0895, lng:38.0637 },
{ name:"عرعر", lat:30.9753, lng:41.0381 },
{ name:"سكاكا", lat:29.9697, lng:40.2064 },
{ name:"القريات", lat:31.3317, lng:37.3433 },
{ name:"الدوادمي", lat:24.5077, lng:44.3926 },
{ name:"الخرج", lat:24.1559, lng:47.3345 },
{ name:"الرس", lat:25.8694, lng:43.4973 },
{ name:"المجمعة", lat:25.8937, lng:45.3415 },
{ name:"بيشة", lat:20.0129, lng:42.6052 },
{ name:"الخفجي", lat:28.4251, lng:48.4913 },
{ name:"رابغ", lat:22.7986, lng:39.0340 },
{ name:"الليث", lat:20.2750, lng:40.4167 },
{ name:"بالجرشي", lat:19.8656, lng:41.5776 }
];

// عرض المدن في القائمة
const select = document.getElementById("city");

cities.forEach(c=>{
let opt=document.createElement("option");
opt.value=c.name;
opt.textContent=c.name;
select.appendChild(opt);
});

// عرض مراكز الصيانة
centers.forEach(c=>{
L.marker([c.lat,c.lng]).addTo(map).bindPopup("مركز: "+c.name);
});

// أقرب مركزين
function nearestTwo(lat,lng){

return centers
.map(c=>{
return {...c, dist: map.distance([lat,lng],[c.lat,c.lng])};
})
.sort((a,b)=>a.dist-b.dist)
.slice(0,2);

}

// رسم الطريق الحقيقي
function drawRoute(from,to,cb){

fetch(`https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`)
.then(r=>r.json())
.then(data=>{

let route = data.routes[0];

let coords = route.geometry.coordinates.map(c=>[c[1],c[0]]);

if(window.line) map.removeLayer(window.line);

window.line = L.polyline(coords,{color:'blue'}).addTo(map);

cb(route.distance,route.duration);

});

}

// عند اختيار مدينة
select.onchange=function(){

let city = cities.find(c=>c.name==this.value);

let nearest = nearestTwo(city.lat,city.lng);

drawRoute(city,nearest[0],(dist,time)=>{

map.setView([city.lat,city.lng],7);

let hours = Math.floor(time / 3600);
let minutes = Math.round((time % 3600) / 60);

let timeText = "";
if(hours > 0){
timeText = hours + " ساعة و " + minutes + " دقيقة";
} else {
timeText = minutes + " دقيقة";
}

document.getElementById("info").innerHTML =
"أقرب مركز 1: <b>" + nearest[0].name + "</b><br>" +
"أقرب مركز 2: <b>" + nearest[1].name + "</b><br>" +
"المسافة: " + (dist/1000).toFixed(1) + " كم<br>" +
"الوقت: " + timeText;

});

};

</script>

</body>
</html>
