<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام الصيانة الذكي - السعودية</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Tahoma; }
#map { height:100vh; }

.panel{
position:absolute;
top:10px;
right:10px;
z-index:999;
background:white;
padding:10px;
border-radius:10px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
max-height:90vh;
overflow:auto;
}

select, button{
width:100%;
padding:8px;
margin-top:8px;
}

#info{
margin-top:10px;
font-size:13px;
line-height:1.6;
}
</style>
</head>

<body>

<div class="panel">
<b>مراكز الصيانة - السعودية</b>

<select id="places">
<option>جاري تحميل المدن والقرى...</option>
</select>

<div id="info"></div>
</div>

<div id="map"></div>

<script>

// الخريطة
const map = L.map('map').setView([24.5,45.5],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

// مراكز الصيانة
const centers = [
{ name:"الرياض", lat:24.7136, lng:46.6753 },
{ name:"جدة", lat:21.5433, lng:39.1728 },
{ name:"الدمام", lat:26.4207, lng:50.0888 },
{ name:"أبها", lat:18.2164, lng:42.5053 },
{ name:"المدينة", lat:24.5247, lng:39.5692 }
];

centers.forEach(c=>{
L.marker([c.lat,c.lng]).addTo(map).bindPopup("مركز: "+c.name);
});

let places = [];
let select = document.getElementById("places");

// 🚀 جلب كل المدن والقرى من OpenStreetMap
async function loadPlaces(){

// حدود السعودية
let query = `
[out:json];
area["name"="Saudi Arabia"]->.a;
node["place"](area.a);
out 2000;
`;

let url = "https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query);

let res = await fetch(url);
let data = await res.json();

places = data.elements.map(p=>({
name: p.tags.name,
lat: p.lat,
lng: p.lon
})).filter(p=>p.name);

select.innerHTML = "<option>اختر مدينة أو قرية</option>";

places.forEach(p=>{
let opt=document.createElement("option");
opt.value=p.name;
opt.textContent=p.name;
select.appendChild(opt);
});

console.log("Loaded places:", places.length);
}

loadPlaces();

// أقرب مركزين
function nearestTwo(lat,lng){

return centers
.map(c=>{
return {...c, dist: map.distance([lat,lng],[c.lat,c.lng])};
})
.sort((a,b)=>a.dist-b.dist)
.slice(0,2);

}

// رسم طريق
function drawRoute(from,to,color,cb){

fetch(`https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`)
.then(r=>r.json())
.then(data=>{

let route = data.routes[0];
let coords = route.geometry.coordinates.map(c=>[c[1],c[0]]);

let line = L.polyline(coords,{color:color}).addTo(map);

cb(route.distance,route.duration,line);

});

}

let line1,line2;

// عند الاختيار
select.onchange=function(){

let city = places.find(p=>p.name==this.value);
if(!city) return;

map.setView([city.lat,city.lng],8);

let nearest = nearestTwo(city.lat,city.lng);

if(line1) map.removeLayer(line1);
if(line2) map.removeLayer(line2);

// مركز 1
drawRoute(city,nearest[0],'blue',(d1,t1,l1)=>{

line1=l1;

let h1=Math.floor(t1/3600);
let m1=Math.round((t1%3600)/60);

let time1 = h1>0 ? h1+" ساعة و "+m1+" دقيقة" : m1+" دقيقة";

// مركز 2
drawRoute(city,nearest[1],'green',(d2,t2,l2)=>{

line2=l2;

let h2=Math.floor(t2/3600);
let m2=Math.round((t2%3600)/60);

let time2 = h2>0 ? h2+" ساعة و "+m2+" دقيقة" : m2+" دقيقة";

document.getElementById("info").innerHTML=
"<b>الموقع:</b> "+city.name+"<br><br>"+

"<b>أقرب مركز 1:</b> "+nearest[0].name+"<br>"+
"المسافة: "+(d1/1000).toFixed(1)+" كم<br>"+
"الوقت: "+time1+"<br><br>"+

"<b>أقرب مركز 2:</b> "+nearest[1].name+"<br>"+
"المسافة: "+(d2/1000).toFixed(1)+" كم<br>"+
"الوقت: "+time2;

});

});

};

</script>

</body>
</html>
