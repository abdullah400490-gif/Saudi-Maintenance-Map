<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام الصيانة الذكي</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Tahoma; }
#map { height:100vh; }

.panel{
position:absolute;
top:10px;
right:10px;
z-index:999;
background:white;
padding:10px;
border-radius:10px;
width:260px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
width:100%;
padding:10px;
margin-top:8px;
cursor:pointer;
}

select{
width:100%;
padding:8px;
margin-top:8px;
}
</style>
</head>

<body>

<div class="panel">
<b>نظام مراكز الصيانة</b>

<select id="city"></select>

<button onclick="locate()">📍 موقعي</button>

<div id="info"></div>
</div>

<div id="map"></div>

<script>

// الخريطة
const map = L.map('map').setView([24.8,45.5],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

// مراكز الصيانة
const centers = [
{ name:"الرياض", lat:24.7136, lng:46.6753 },
{ name:"جدة", lat:21.5433, lng:39.1728 },
{ name:"الدمام", lat:26.4207, lng:50.0888 },
{ name:"أبها", lat:18.2164, lng:42.5053 },
{ name:"تبوك", lat:28.3998, lng:36.5715 }
];

// المدن
const cities = [
{ name:"الرياض", lat:24.7136, lng:46.6753 },
{ name:"جدة", lat:21.5433, lng:39.1728 },
{ name:"الدمام", lat:26.4207, lng:50.0888 },
{ name:"أبها", lat:18.2164, lng:42.5053 },
{ name:"تبوك", lat:28.3998, lng:36.5715 }
];

// markers
centers.forEach(c=>{
L.marker([c.lat,c.lng]).addTo(map).bindPopup(c.name);
});

// تعبئة القائمة
const sel = document.getElementById("city");

cities.forEach(c=>{
let opt=document.createElement("option");
opt.value=c.name;
opt.textContent=c.name;
sel.appendChild(opt);
});

let routeLine;

// أقرب مركزين
function nearestTwo(lat,lng){
return centers
.map(c=>{
return {...c, dist: map.distance([lat,lng],[c.lat,c.lng])};
})
.sort((a,b)=>a.dist-b.dist)
.slice(0,2);
}

// رسم طريق حقيقي باستخدام OSRM
function drawRoute(from,to,cb){

fetch(`https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`)
.then(r=>r.json())
.then(data=>{

let route = data.routes[0];

let coords = route.geometry.coordinates.map(c=>[c[1],c[0]]);

if(routeLine) map.removeLayer(routeLine);

routeLine = L.polyline(coords,{color:'blue'}).addTo(map);

cb(route.distance, route.duration);

});
}

// عند اختيار مدينة
sel.onchange=function(){

let city=cities.find(c=>c.name==this.value);

let nearest=nearestTwo(city.lat,city.lng);

drawRoute(city,nearest[0],(dist,time)=>{

map.setView([city.lat,city.lng],6);

document.getElementById("info").innerHTML=
"أقرب مركز: "+nearest[0].name+"<br>"+
"المسافة: "+(dist/1000).toFixed(1)+" كم<br>"+
"الوقت: "+(time/60).toFixed(0)+" دقيقة";

});
};

// تحديد الموقع
function locate(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude;
let lng=pos.coords.longitude;

L.marker([lat,lng]).addTo(map).bindPopup("أنت هنا").openPopup();

let nearest=nearestTwo(lat,lng);

drawRoute({lat,lng},nearest[0],(dist,time)=>{

map.setView([lat,lng],6);

document.getElementById("info").innerHTML=
"أقرب مركز: "+nearest[0].name+"<br>"+
"المسافة: "+(dist/1000).toFixed(1)+" كم<br>"+
"الوقت: "+(time/60).toFixed(0)+" دقيقة";

});

});

}

</script>

</body>
</html>
