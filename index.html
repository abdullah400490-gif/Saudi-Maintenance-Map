<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام المناطق النائية</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Tahoma;
}

#map{
height:100vh;
}

.panel{
position:absolute;
top:10px;
right:10px;
z-index:999;
background:white;
padding:10px;
border-radius:10px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

#city{
width:100%;
padding:8px;
margin-top:8px;
border-radius:8px;
direction:rtl;
text-align:right;
text-align-last:right;
}

#city option{
text-align:right;
}

#info{
margin-top:10px;
font-size:13px;
line-height:1.8;
text-align:right;
}
</style>
</head>

<body>

<div class="panel">
<b>نظام المناطق النائية ومراكز الصيانة</b>

<select id="city">
<option>اختر مدينة أو اضغط عليها من الخريطة</option>
</select>

<div id="info"></div>
</div>

<div id="map"></div>

<script>

// ======================
// إنشاء الخريطة
// ======================
const map = L.map('map').setView([24.5,45.5],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

// ======================
// ألوان المناطق
// ======================
function getColor(name){

const teal = "#70CACB";
const purple = "#56459C";

const tealRegions = [
"الحدود الشمالية",
"القصيم",
"الشرقية",
"نجران",
"جازان",
"مكة",
"تبوك"
];

return tealRegions.includes(name) ? teal : purple;
}

// ======================
// رسم مناطق السعودية (GeoJSON)
// ======================
fetch("saudi-regions.geojson")
.then(r => r.json())
.then(data => {

L.geoJSON(data, {

style: function(feature){
return {
fillColor: getColor(feature.properties.name),
color: "#ffffff",
weight: 1,
fillOpacity: 0.7
};
},

onEachFeature: function(feature, layer){
layer.bindPopup(feature.properties.name);
}

}).addTo(map);

});

</script>

</body>
</html>
