<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام الصيانة الذكي</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Tahoma; }
#map { height:100vh; }

/* الشعار */
.logo{
position:absolute;
top:10px;
left:10px;
z-index:9999;
background:white;
padding:6px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.logo img{
height:55px;
display:block;
}

/* لوحة التحكم */
.panel{
position:absolute;
top:10px;
right:10px;
z-index:999;
background:white;
padding:10px;
border-radius:10px;
width:320px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

select{
width:100%;
padding:8px;
margin-top:8px;
}

#info{
margin-top:10px;
font-size:13px;
line-height:1.6;
}
</style>
</head>

<body>

<!-- الشعار -->
<div class="logo">
<img src="logo.png">
</div>

<!-- لوحة التحكم -->
<div class="panel">
<b>نظام مراكز الصيانة</b><br>

<select id="places">
<option>اختر موقع...</option>
</select>

<div id="info"></div>
</div>

<div id="map"></div>

<script>

// =======================
// الخريطة
// =======================
const map = L.map('map').setView([24.5,45.5],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

// =======================
// مراكز الصيانة
// =======================
const centers = [
{ name:"الرياض", lat:24.7136, lng:46.6753 },
{ name:"جدة", lat:21.5433, lng:39.1728 },
{ name:"الدمام", lat:26.4207, lng:50.0888 },
{ name:"أبها", lat:18.2164, lng:42.5053 },
{ name:"المدينة المنورة", lat:24.5247, lng:39.5692 }
];

centers.forEach(c=>{
L.marker([c.lat,c.lng]).addTo(map).bindPopup(c.name);
});

// =======================
// بيانات محلية (حل مضمون بدل 0 موقع)
// =======================
const places = [
{ name:"الرياض", lat:24.7136, lng:46.6753 },
{ name:"جدة", lat:21.5433, lng:39.1728 },
{ name:"مكة", lat:21.3891, lng:39.8579 },
{ name:"الدمام", lat:26.4207, lng:50.0888 },
{ name:"المدينة المنورة", lat:24.5247, lng:39.5692 },
{ name:"الطائف", lat:21.2703, lng:40.4158 },
{ name:"أبها", lat:18.2164, lng:42.5053 },
{ name:"نجران", lat:17.5656, lng:44.2289 },
{ name:"تبوك", lat:28.3998, lng:36.5715 },
{ name:"حائل", lat:27.5114, lng:41.7208 }
];

// =======================
// تعبئة القائمة
// =======================
let select = document.getElementById("places");

places.forEach(p=>{
let opt=document.createElement("option");
opt.value=p.name;
opt.textContent=p.name;
select.appendChild(opt);
});

// =======================
// أقرب مركزين
// =======================
function nearestTwo(lat,lng){

return centers
.map(c=>{
return {...c, dist: map.distance([lat,lng],[c.lat,c.lng])};
})
.sort((a,b)=>a.dist-b.dist)
.slice(0,2);

}

// =======================
// رسم طريق (بديل بسيط بدون API مشاكل)
// =======================
function drawLine(from,to,color){

let line = L.polyline([
[from.lat,from.lng],
[to.lat,to.lng]
],{color:color,weight:5}).addTo(map);

return line;
}

// =======================
// تشغيل النظام
// =======================
let line1,line2;

function run(lat,lng,name){

if(line1) map.removeLayer(line1);
if(line2) map.removeLayer(line2);

map.setView([lat,lng],7);

let nearest = nearestTwo(lat,lng);

// 🟢 الأقرب
line1 = drawLine({lat,lng},nearest[0],'green');

// 🔴 الثاني
line2 = drawLine({lat,lng},nearest[1],'red');

let d1 = nearest[0].dist;
let d2 = nearest[1].dist;

document.getElementById("info").innerHTML=

"<b>📍 الموقع:</b> "+name+"<br><br>"+

"<b>🟢 أقرب مركز:</b> "+nearest[0].name+"<br>"+
"المسافة: "+(d1/1000).toFixed(1)+" كم<br><br>"+

"<b>🔴 المركز الثاني:</b> "+nearest[1].name+"<br>"+
"المسافة: "+(d2/1000).toFixed(1)+" كم";

}

// =======================
// اختيار من القائمة
// =======================
select.onchange=function(){

let p = places.find(x=>x.name==this.value);
if(!p) return;

run(p.lat,p.lng,p.name);

};

// =======================
// اختيار من الخريطة
// =======================
map.on('click', function(e){

let lat = e.latlng.lat;
let lng = e.latlng.lng;

L.marker([lat,lng]).addTo(map);

run(lat,lng,"موقع من الخريطة");

});

</script>

</body>
</html>
