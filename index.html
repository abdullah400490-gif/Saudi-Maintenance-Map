<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام مراكز الصيانة الذكي</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Tahoma; }

#map { height:100vh; }

.panel{
position:absolute;
top:10px;
right:10px;
z-index:999;
background:white;
padding:12px;
border-radius:10px;
width:270px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
font-size:14px;
}

button{
width:100%;
padding:8px;
margin-top:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="panel">
<b>نظام مراكز الصيانة</b>
<br><br>
<button onclick="locateUser()">📍 تحديد موقعي</button>
<div id="info"></div>
</div>

<div id="map"></div>

<script>

// الخريطة
const map = L.map('map').setView([24.8,45.5],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// مراكز الصيانة
const centers = [
{ name:"الرياض", lat:24.7136, lng:46.6753 },
{ name:"جدة", lat:21.5433, lng:39.1728 },
{ name:"الدمام", lat:26.4207, lng:50.0888 },
{ name:"الخبر", lat:26.2172, lng:50.1971 },
{ name:"أبها", lat:18.2164, lng:42.5053 },
{ name:"تبوك", lat:28.3998, lng:36.5715 },
{ name:"حائل", lat:27.5114, lng:41.7208 }
];

// عرض المراكز
centers.forEach(c=>{
L.marker([c.lat,c.lng]).addTo(map).bindPopup(c.name);
});

// حساب أقرب مركز
function getNearest(lat,lng){
let nearest=null;
let min=Infinity;

centers.forEach(c=>{
let d = map.distance([lat,lng],[c.lat,c.lng]);
if(d < min){
min=d;
nearest=c;
}
});

return {nearest, distance:min};
}

let line;

// تحديد موقع المستخدم
function locateUser(){

if(!navigator.geolocation){
alert("المتصفح لا يدعم الموقع");
return;
}

navigator.geolocation.getCurrentPosition(pos=>{

const userLat = pos.coords.latitude;
const userLng = pos.coords.longitude;

// مركز المستخدم
L.marker([userLat,userLng])
.addTo(map)
.bindPopup("أنت هنا")
.openPopup();

// أقرب مركز
const result = getNearest(userLat,userLng);

// رسم خط
if(line) map.removeLayer(line);

line = L.polyline([
[userLat,userLng],
[result.nearest.lat,result.nearest.lng]
]).addTo(map);

// تحريك الكاميرا
map.setView([userLat,userLng],6);

// عرض النتيجة
document.getElementById("info").innerHTML =
"أقرب مركز: <b>" + result.nearest.name + "</b><br>" +
"المسافة: <b>" + (result.distance/1000).toFixed(1) + " كم</b>";

});

}

</script>

</body>
</html>
